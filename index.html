<!DOCTYPE html>
<html>
<head>
    <title>POTOLUX — Натяжные потолки</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            max-width: 420px; 
            margin: 30px auto; 
            padding: 15px; 
            background: #0d0d0d;
            min-height: 100vh;
        }
        .calc { 
            background: linear-gradient(145deg, #1a1a1a, #121212);
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 30px rgba(201, 168, 76, 0.1);
            border: 1px solid #2a2a2a;
            border-top: 5px solid #c9a84c;
        }
        .logo {
            text-align: center;
            margin-bottom: 10px;
        }
        .logo h1 {
            font-size: 34px;
            color: #ffffff;
            margin: 0;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 0 40px rgba(201, 168, 76, 0.15);
        }
        .logo h1 span {
            color: #c9a84c;
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin: 0;
            letter-spacing: 6px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin: -5px 0 15px 0;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 12px;
        }
        label { 
            display: block; 
            font-weight: 600; 
            margin-top: 12px; 
            color: #ddd;
            font-size: 14px;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 4px; 
            border: 2px solid #2a2a2a; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box;
            transition: 0.3s;
            background: #1a1a1a;
            color: #fff;
        }
        input:focus, select:focus {
            border-color: #c9a84c;
            outline: none;
            background: #222;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.1);
        }
        select option {
            background: #1a1a1a;
            color: #fff;
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #c9a84c, #b8923a);
            color: #0d0d0d; 
            border: none; 
            border-radius: 30px; 
            font-size: 20px; 
            font-weight: 700;
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
            letter-spacing: 1px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.2);
        }
        button:hover { 
            transform: scale(1.02);
            box-shadow: 0 8px 35px rgba(201, 168, 76, 0.4);
        }
        .result { 
            font-size: 34px; 
            font-weight: 800; 
            color: #ffffff; 
            text-align: center; 
            margin-top: 20px; 
            padding: 15px;
            background: #0d0d0d;
            border-radius: 16px;
            border: 2px solid #c9a84c;
            box-shadow: inset 0 0 30px rgba(201, 168, 76, 0.05);
        }
        .result span {
            color: #c9a84c;
        }
        .detail {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-top: 8px;
        }
        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #444;
            border-top: 1px solid #1a1a1a;
            padding-top: 12px;
        }
        .footer a {
            color: #c9a84c;
            text-decoration: none;
            font-weight: 600;
        }
        .badge {
            display: inline-block;
            background: #c9a84c;
            color: #0d0d0d;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        ::selection {
            background: #c9a84c;
            color: #0d0d0d;
        }
    </style>
</head>
<body>

<div class="calc">

    <div class="logo">
        <h1>POTOL<span>UX</span></h1>
        <p>НАТЯЖНЫЕ ПОТОЛКИ</p>
    </div>
    <div class="subtitle">
        <span class="badge">★ Профессиональный расчёт</span> 
        <span style="margin-left:8px; color:#444;">by Anton Voitovich</span>
    </div>

    <label>📏 Длина комнаты (м)</label>
    <input type="number" id="d" value="4" step="0.1">

    <label>📐 Ширина комнаты (м)</label>
    <input type="number" id="w" value="3" step="0.1">

    <label>🧵 Тип полотна</label>
    <select id="m">
        <option value="500">Матовый (500 ₽/м²)</option>
        <option value="700">Глянцевый (700 ₽/м²)</option>
        <option value="900">Сатин (900 ₽/м²)</option>
        <option value="1200">Тканевый (1200 ₽/м²)</option>
    </select>

    <label>💡 Количество светильников</label>
    <input type="number" id="l" value="4" min="0">

    <label>🔧 Трубы для обхода</label>
    <input type="number" id="p" value="0" min="0">

    <button onclick="calc()">💰 Рассчитать стоимость</button>

    <div class="result" id="res">0 <span>₽</span></div>
    <div class="detail">* Ориентировочная стоимость с учётом материалов и работы</div>

    <div class="footer">
        📞 <a href="tel:+71234567890">+7 (123) 456-78-90</a> &nbsp;|&nbsp; 
        ⏱️ <span style="color:#c9a84c;">Монтаж 1 день</span>
    </div>
</div>

<script>
function calc() {
    let d = parseFloat(document.getElementById('d').value) || 0;
    let w = parseFloat(document.getElementById('w').value) || 0;
    let m = parseFloat(document.getElementById('m').value);
    let l = parseInt(document.getElementById('l').value) || 0;
    let p = parseInt(document.getElementById('p').value) || 0;

    let area = d * w;
    let perimeter = (d + w) * 2;

    let total = (area * m) + (perimeter * 150) + (l * 500) + (p * 400) + (area * 300);

    document.getElementById('res').innerHTML = total.toFixed(0) + ' <span>₽</span>';
}

window.onload = calc;
</script>

</body>
</html>
