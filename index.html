<!DOCTYPE html>
<html>
<head>
    <title>Калькулятор</title>
</head>
<body>
    <h2>Тест калькулятора</h2>
    <p>Длина: <input type="number" id="d" value="4"></p>
    <p>Ширина: <input type="number" id="w" value="3"></p>
    <button onclick="calc()">Рассчитать</button>
    <p>Результат: <span id="res">0</span> ₽</p>

    <script>
        function calc() {
            let d = document.getElementById('d').value;
            let w = document.getElementById('w').value;
            let result = d * w;
            document.getElementById('res').innerHTML = result;
        }
    </script>
</body>
</html>
