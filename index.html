<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор потолков</title>
<style>
body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
button { width: 100%; padding: 15px; background: #2c7be0; color: white; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; }
.result { font-size: 30px; font-weight: bold; color: #2c7be0; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<div style="background:white; padding:30px; border-radius:16px; box-shadow:0 0 20px #ddd;">
<h2>Расчёт натяжного потолка</h2>

<p>Длина (м)</p>
<input type="number" id="d" value="4" step="0.1">

<p>Ширина (м)</p>
<input type="number" id="w" value="3" step="0.1">

<p>Тип полотна</p>
<select id="m">
    <option value="500">Матовый (500 ₽/м²)</option>
    <option value="700">Глянцевый (700 ₽/м²)</option>
    <option value="900">Сатин (900 ₽/м²)</option>
</select>

<p>Светильники (шт)</p>
<input type="number" id="l" value="4" min="0">

<p>Трубы (шт)</p>
<input type="number" id="p" value="0" min="0">

<button onclick="calc()">Рассчитать стоимость</button>

<div class="result" id="res">0 ₽</div>
</div>

<script>
function calc() {
    let d = document.getElementById('d').value;
    let w = document.getElementById('w').value;
    let m = document.getElementById('m').value;
    let l = document.getElementById('l').value;
    let p = document.getElementById('p').value;

    // Если поля пустые, ставим 0
    if (d == '') d = 0;
    if (w == '') w = 0;
    if (l == '') l = 0;
    if (p == '') p = 0;

    d = parseFloat(d);
    w = parseFloat(w);
    m = parseFloat(m);
    l = parseInt(l);
    p = parseInt(p);

    let area = d * w;
    let perimeter = (d + w) * 2;

    let total = (area * m) + (perimeter * 150) + (l * 500) + (p * 400) + (area * 300);

    document.getElementById('res').innerHTML = total.toFixed(0) + ' ₽';
}

// Автоматический расчет при открытии страницы
window.onload = calc;
</script>

</body>
</html>
